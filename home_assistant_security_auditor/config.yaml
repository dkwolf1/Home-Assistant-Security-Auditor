name: Home Assistant Security Auditor
version: "0.1.3"
slug: home_assistant_security_auditor
description: Audit external access security for Home Assistant setups.
url: https://github.com/dkwolf1/Home-Assistant-Security-Auditor/tree/main/home_assistant_security_auditor
arch:
  - aarch64
  - amd64
startup: services
boot: manual
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:shield-search
panel_title: Security Auditor
homeassistant_api: true
hassio_api: true
map:
  - type: homeassistant_config
    read_only: true
    path: /homeassistant
options:
  public_url: ""
  scan_common_ports: false
  request_timeout_seconds: 6
schema:
  public_url: str?
  scan_common_ports: bool
  request_timeout_seconds: int(2,20)
